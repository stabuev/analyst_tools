version: 2

data_tests:
  - name: assert_paid_revenue_reconciles
    description: "Blocking reconciliation: mart paid revenue must match source order grain after line aggregation, refunds and currency conversion."
  - name: assert_daily_revenue_reconciles
    description: "Blocking reconciliation: daily fact paid revenue must match the same order-grain control calculation."
  - name: assert_no_many_to_many_revenue_join
    description: "Blocking join contract: order line revenue must not multiply order amount through many-to-many joins."
  - name: warn_customers_without_subscription
    description: "Warning diagnostic: customers without subscription state are visible to consumers but do not fail the mart contract."
  - name: assert_subscription_history_has_one_current_row
    description: "Blocking SCD contract: every subscription has exactly one current version."
  - name: assert_subscription_history_windows_do_not_overlap
    description: "Blocking SCD contract: closed validity windows end exactly at the next version start."
  - name: assert_snapshot_does_not_version_noisy_updated_at
    description: "Blocking noise guard: technical updated_at reloads do not create a new subscription version without business state change."
