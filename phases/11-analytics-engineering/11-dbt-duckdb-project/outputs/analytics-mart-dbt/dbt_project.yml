name: analytics_mart_dbt
version: "1.0.0"
config-version: 2

profile: analytics_mart_dbt

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  analytics_mart_dbt:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table

data_tests:
  analytics_mart_dbt:
    +store_failures: false

snapshots:
  analytics_mart_dbt:
    +target_schema: snapshots
