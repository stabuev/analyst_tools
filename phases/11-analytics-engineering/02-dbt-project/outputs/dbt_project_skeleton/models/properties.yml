version: 2

models:
  - name: stg_project_smoke
    description: "Minimal staging model used to prove that the dbt project parses and compiles."
    columns:
      - name: smoke_check
        description: "Stable smoke-check label."
      - name: passed
        description: "Integer flag used by downstream smoke models."
      - name: layer_name
        description: "Layer marker for the staging step."
  - name: int_project_smoke
    description: "Minimal intermediate model that depends on the staging smoke model."
    columns:
      - name: smoke_check
        description: "Stable smoke-check label from staging."
      - name: passed
        description: "Integer flag from staging."
      - name: next_layer
        description: "Layer marker for the intermediate step."
  - name: mart_project_smoke
    description: "Minimal mart model used as a compile target for the project skeleton."
    columns:
      - name: smoke_check
        description: "Stable smoke-check label from upstream models."
      - name: passed
        description: "Integer flag from upstream models."
      - name: published_layer
        description: "Layer marker for the mart step."
