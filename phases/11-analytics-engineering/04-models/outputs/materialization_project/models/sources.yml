version: 2

sources:
  - name: raw_app
    schema: raw
    description: "Raw extract for the phase 11 customer revenue mart."
    tables:
      - name: users
        identifier: raw_users
        config:
          loaded_at_field: updated_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: events
        identifier: raw_events
        config:
          loaded_at_field: received_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: orders
        identifier: raw_orders
        config:
          loaded_at_field: updated_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: order_items
        identifier: raw_order_items
        config:
          loaded_at_field: loaded_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: subscriptions
        identifier: raw_subscriptions
        config:
          loaded_at_field: updated_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: support_tickets
        identifier: raw_support_tickets
        config:
          loaded_at_field: created_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: refunds
        identifier: raw_refunds
        config:
          loaded_at_field: refunded_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: currency_rates
        identifier: raw_currency_rates
        config:
          loaded_at_field: loaded_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
