version: 2

exposures:
  - name: customer_revenue_health_dashboard
    label: Customer Revenue Health Dashboard
    type: dashboard
    maturity: high
    url: https://example.com/analytics/customer-revenue-health
    description: "{{ doc('customer_revenue_health_dashboard_docs') }}"
    depends_on:
      - ref('mart_customer_revenue_health')
      - ref('fct_order_revenue_daily')
      - ref('int_subscription_history')
    owner:
      name: Analytics Engineering Team
      email: analytics-engineering@example.com
    meta:
      owner_team: analytics_engineering
      consumers:
        - product
        - finance
        - customer_success
      decision_claims:
        - id: customer_health_segment_supported
          claim: "Customer health segment is backed by paid revenue, refunds and support load."
          upstream_models:
            - mart_customer_revenue_health
          required_tests:
            - assert_paid_revenue_reconciles
            - warn_customers_without_subscription
        - id: daily_paid_revenue_reconciles
          claim: "Daily paid revenue can be reconciled to order grain."
          upstream_models:
            - fct_order_revenue_daily
          required_tests:
            - assert_daily_revenue_reconciles
        - id: subscription_history_is_point_in_time
          claim: "Subscription plan/status history has one current version and non-overlapping validity windows."
          upstream_models:
            - int_subscription_history
          required_tests:
            - assert_subscription_history_has_one_current_row
            - assert_subscription_history_windows_do_not_overlap
            - assert_snapshot_does_not_version_noisy_updated_at
