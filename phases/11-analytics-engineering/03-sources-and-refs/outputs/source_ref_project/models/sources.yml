version: 2

sources:
  - name: raw_app
    schema: raw
    description: "Tiny raw extract for the customer revenue health mart lessons."
    tables:
      - name: users
        identifier: raw_users
        description: "One registered user."
        config:
          loaded_at_field: updated_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: events
        identifier: raw_events
        description: "One client or server event."
        config:
          loaded_at_field: received_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: orders
        identifier: raw_orders
        description: "One order or marketplace payment."
        config:
          loaded_at_field: updated_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: order_items
        identifier: raw_order_items
        description: "One line item inside an order."
        config:
          loaded_at_field: loaded_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: subscriptions
        identifier: raw_subscriptions
        description: "One subscription period."
        config:
          loaded_at_field: updated_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: support_tickets
        identifier: raw_support_tickets
        description: "One support ticket."
        config:
          loaded_at_field: created_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: refunds
        identifier: raw_refunds
        description: "One refund event for an order."
        config:
          loaded_at_field: refunded_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
      - name: currency_rates
        identifier: raw_currency_rates
        description: "One currency rate for one calendar date."
        config:
          loaded_at_field: loaded_at
          freshness:
            warn_after: {count: 10000, period: day}
            error_after: {count: 20000, period: day}
