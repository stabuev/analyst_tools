version: 2

models:
  - name: stg_users
    description: "Normalized users source with one row per registered user."
    columns:
      - name: user_id
        description: "User primary key from raw_users."
      - name: updated_at
        description: "Freshness timestamp carried from the raw source."
  - name: stg_orders
    description: "Normalized orders source with one row per order."
    columns:
      - name: order_id
        description: "Order primary key from raw_orders."
      - name: updated_at
        description: "Freshness timestamp carried from the raw source."
  - name: stg_order_items
    description: "Normalized order item source with one row per order line."
    columns:
      - name: order_id
        description: "Order identifier."
      - name: line_number
        description: "Line number inside the order."
  - name: int_order_line_revenue
    description: "Order line revenue joined to order status through ref dependencies."
  - name: mart_customer_revenue_health
    description: "Minimal customer revenue health mart fed only by ref dependencies."
