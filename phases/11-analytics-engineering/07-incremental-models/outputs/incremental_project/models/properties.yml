version: 2

models:
  - name: stg_users
    description: "One row per registered user with normalized user attributes."
    config:
      materialized: view
    meta:
      layer: staging
      grain: "one registered user"
      consumer: "intermediate and mart models"
      materialization_reason: "Light source-shaped projection; freshness should follow raw data on each query."
      cost_note: "Low-cost casts and renames, no business aggregation."
      required_tests: ["not_null:user_id", "unique:user_id"]
    columns:
      - name: user_id
        data_tests:
          - unique
          - not_null
      - name: platform
        data_tests:
          - accepted_values:
              arguments:
                values: ['android', 'ios', 'web']
  - name: stg_events
    description: "One row per source event with typed timestamps and normalized platform."
    config:
      materialized: view
    meta:
      layer: staging
      grain: "one client or server event"
      consumer: "future behavior models"
      materialization_reason: "Event staging is a transparent raw boundary, not a stored mart."
      cost_note: "Projection only; later incremental event marts handle volume."
      required_tests: ["not_null:event_id", "unique:event_id", "accepted_values:platform"]
    columns:
      - name: event_id
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id
      - name: platform
        data_tests:
          - accepted_values:
              arguments:
                values: ['android', 'ios', 'web']
  - name: stg_orders
    description: "One row per order with typed amount, status and order date."
    config:
      materialized: view
    meta:
      layer: staging
      grain: "one order or marketplace payment"
      consumer: "intermediate revenue models"
      materialization_reason: "Keeps order source logic current and inspectable."
      cost_note: "Small normalization work before joins."
      required_tests: ["not_null:order_id", "unique:order_id", "relationships:user_id", "accepted_values:status"]
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: ['paid', 'refunded']
      - name: amount
        data_tests:
          - not_null
  - name: stg_order_items
    description: "One row per order line item."
    config:
      materialized: view
    meta:
      layer: staging
      grain: "one line item inside an order"
      consumer: "line revenue intermediate model"
      materialization_reason: "Line items are source-shaped and should not be stored twice."
      cost_note: "Projection and decimal casts only."
      required_tests: ["not_null:order_id", "relationships:order_id", "not_null:line_number"]
    columns:
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: line_number
        data_tests:
          - not_null
      - name: quantity
        data_tests:
          - not_null
  - name: stg_subscriptions
    description: "One row per subscription period."
    config:
      materialized: view
    meta:
      layer: staging
      grain: "one subscription period"
      consumer: "latest subscription status model"
      materialization_reason: "Subscription state is mutable; snapshots arrive in a later lesson."
      cost_note: "Windowing is left to an intermediate view."
      required_tests: ["not_null:subscription_id", "unique:subscription_id", "accepted_values:status"]
    columns:
      - name: subscription_id
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: ['active', 'cancelled']
  - name: stg_support_tickets
    description: "One row per support ticket."
    config:
      materialized: view
    meta:
      layer: staging
      grain: "one support ticket"
      consumer: "support aggregation by user"
      materialization_reason: "Ticket source is small and source-shaped."
      cost_note: "No aggregation in staging."
      required_tests: ["not_null:ticket_id", "unique:ticket_id", "relationships:user_id"]
    columns:
      - name: ticket_id
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id
  - name: stg_refunds
    description: "One row per refund event for an order."
    config:
      materialized: view
    meta:
      layer: staging
      grain: "one refund event for an order"
      consumer: "refund aggregation intermediate model"
      materialization_reason: "Refunds stay current and transparent before order-level aggregation."
      cost_note: "Projection only."
      required_tests: ["not_null:refund_id", "unique:refund_id", "relationships:order_id"]
    columns:
      - name: refund_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
  - name: stg_currency_rates
    description: "One row per currency and calendar date."
    config:
      materialized: view
    meta:
      layer: staging
      grain: "one currency rate for one calendar date"
      consumer: "mart currency normalization"
      materialization_reason: "Small lookup table; view is enough in the local project."
      cost_note: "Tiny lookup with date and decimal casts."
      required_tests: ["not_null:currency", "not_null:rate_date", "accepted_values:currency"]
    columns:
      - name: currency
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['RUB', 'USD']
      - name: rate_date
        data_tests:
          - not_null
      - name: rate_to_rub
        data_tests:
          - not_null
  - name: int_order_line_revenue
    description: "Reusable line-level revenue logic joined to order status."
    config:
      materialized: ephemeral
    meta:
      layer: intermediate
      grain: "one order line with order status"
      consumer: "mart_customer_revenue_health"
      materialization_reason: "Light reusable CTE used by one downstream mart; keeping it ephemeral avoids extra relations."
      cost_note: "Safe while the compiled mart remains readable and fanout is limited."
      required_tests: ["singular:assert_no_many_to_many_revenue_join"]
  - name: int_refunds_by_order
    description: "Order-level refund amount before currency conversion."
    config:
      materialized: ephemeral
    meta:
      layer: intermediate
      grain: "one refunded order"
      consumer: "mart_customer_revenue_health"
      materialization_reason: "Small aggregation used by a single mart and easy to inspect as compiled CTE."
      cost_note: "Do not make widely shared or debugging-heavy logic ephemeral."
      required_tests: ["relationships:order_id"]
  - name: int_support_by_user
    description: "Support ticket counts and latest ticket timestamp by user."
    config:
      materialized: view
    meta:
      layer: intermediate
      grain: "one user with support ticket summary"
      consumer: "customer revenue health mart and ad-hoc support checks"
      materialization_reason: "Reusable diagnostic model that analysts may query directly."
      cost_note: "Small aggregation, but direct inspectability matters."
      required_tests: ["not_null:user_id", "unique:user_id"]
    columns:
      - name: user_id
        data_tests:
          - unique
          - not_null
  - name: int_subscription_latest
    description: "Latest subscription status by user."
    config:
      materialized: view
    meta:
      layer: intermediate
      grain: "one user with latest subscription state"
      consumer: "customer revenue health mart"
      materialization_reason: "Window logic should be inspectable before snapshot history is introduced."
      cost_note: "View keeps mutable-state caveat visible."
      required_tests: ["not_null:user_id", "unique:user_id", "accepted_values:latest_subscription_status"]
    columns:
      - name: user_id
        data_tests:
          - unique
          - not_null
      - name: latest_subscription_status
        data_tests:
          - accepted_values:
              arguments:
                values: ['active', 'cancelled']
  - name: mart_customer_revenue_health
    description: "Consumer-facing customer revenue health mart."
    config:
      materialized: table
    meta:
      layer: marts
      grain: "one active non-deleted user"
      consumer: "product and finance analysis"
      materialization_reason: "Published mart is queried by consumers and should be fast and stable between runs."
      cost_note: "Rebuild cost is acceptable for the tiny local project; incremental comes later."
      required_tests: ["not_null:user_id", "unique:user_id", "accepted_values:revenue_health_segment", "singular:assert_paid_revenue_reconciles"]
      warning_checks: ["warn_customers_without_subscription"]
    columns:
      - name: user_id
        data_tests:
          - unique
          - not_null
      - name: revenue_health_segment
        data_tests:
          - accepted_values:
              arguments:
                values: ['needs_attention', 'high_value', 'monetized', 'no_revenue']
  - name: fct_order_revenue_daily
    description: "Incremental daily order revenue fact refreshed with a late-arriving data window."
    config:
      materialized: incremental
      unique_key: revenue_date
      incremental_strategy: delete+insert
      on_schema_change: fail
    meta:
      layer: marts
      grain: "one calendar revenue date"
      consumer: "finance reporting and daily revenue monitoring"
      materialization_reason: "Daily revenue grows over time; incremental refresh limits work while preserving a controlled late-arrival window."
      cost_note: "Reprocesses the last two days on every incremental run to catch late orders and refund updates."
      required_tests: ["not_null:revenue_date", "unique:revenue_date", "singular:assert_daily_revenue_reconciles"]
      incremental_contract:
        event_time_column: revenue_date
        unique_key: revenue_date
        late_arrival_window_days: 2
        incremental_strategy: delete+insert
        schema_change_policy: fail
        duplicate_policy: "delete existing rows by revenue_date unique_key, then insert the recalculated window"
        full_refresh_policy: "Run dbt run --full-refresh --select fct_order_revenue_daily after revenue_date grain, schema, key, currency logic or late-arrival policy changes."
        backfill_command: "dbt run --full-refresh --select fct_order_revenue_daily"
    columns:
      - name: revenue_date
        data_tests:
          - unique
          - not_null
      - name: order_count
        data_tests:
          - not_null
      - name: paid_order_count
        data_tests:
          - not_null
      - name: paid_revenue_rub
        data_tests:
          - not_null
