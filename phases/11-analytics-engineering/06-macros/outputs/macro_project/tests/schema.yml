version: 2

data_tests:
  - name: assert_paid_revenue_reconciles
    description: "Contract gate: paid revenue in the mart must reconcile to paid order amounts converted to RUB."
  - name: assert_no_many_to_many_revenue_join
    description: "Contract gate: order line revenue must preserve one row per source order item."
  - name: warn_customers_without_subscription
    description: "Warning diagnostic: customers without active subscription context or with support tickets need review, but do not block publication."
