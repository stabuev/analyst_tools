version: 2

macros:
  - name: normalize_status
    description: "Normalizes an already-selected status expression to lower case without changing business meaning."
    config:
      docs:
        show: true
      meta:
        owner: analytics-engineering
        abstraction_level: low_level_sql
        review_rule: "Safe only for source-shaped string normalization; do not encode allowed statuses here."
    arguments:
      - name: column_name
        type: column
        description: "Column or SQL expression that contains a status-like value."
  - name: normalize_currency
    description: "Normalizes an already-selected currency expression to upper case."
    config:
      docs:
        show: true
      meta:
        owner: analytics-engineering
        abstraction_level: low_level_sql
        review_rule: "Safe for ISO-like currency codes; accepted values remain data tests."
    arguments:
      - name: column_name
        type: column
        description: "Column or SQL expression that contains a currency code."
  - name: to_decimal
    description: "Casts a numeric column or expression to a DuckDB decimal with explicit precision and scale."
    config:
      docs:
        show: true
      meta:
        owner: analytics-engineering
        abstraction_level: low_level_sql
        review_rule: "Safe for mechanical type normalization; do not hide metric formulas inside the argument."
    arguments:
      - name: column_name
        type: column
        description: "Column or SQL expression to cast."
      - name: precision
        type: integer
        description: "Total decimal precision. Defaults to 18."
      - name: scale
        type: integer
        description: "Decimal scale. Defaults to 2."
  - name: money_product
    description: "Multiplies quantity by unit price and casts the result to an explicit money decimal."
    config:
      docs:
        show: true
      meta:
        owner: analytics-engineering
        abstraction_level: low_level_sql
        review_rule: "Safe only for row-level line item arithmetic where grain is already visible in the model."
    arguments:
      - name: quantity_column
        type: column
        description: "Column or SQL expression with item quantity."
      - name: unit_price_column
        type: column
        description: "Column or SQL expression with item unit price."
      - name: precision
        type: integer
        description: "Total decimal precision. Defaults to 18."
      - name: scale
        type: integer
        description: "Decimal scale. Defaults to 2."
  - name: rub_amount
    description: "Converts a native-currency amount expression to RUB using an explicit rate expression."
    config:
      docs:
        show: true
      meta:
        owner: analytics-engineering
        abstraction_level: low_level_sql
        review_rule: "Safe for arithmetic conversion only; join keys, dates and paid/refund semantics stay in the model."
    arguments:
      - name: amount_column
        type: column
        description: "Column or SQL expression with an amount in source currency."
      - name: rate_column
        type: column
        description: "Column or SQL expression with a RUB exchange rate."
      - name: precision
        type: integer
        description: "Total decimal precision. Defaults to 18."
      - name: scale
        type: integer
        description: "Decimal scale. Defaults to 2."
