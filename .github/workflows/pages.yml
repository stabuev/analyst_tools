name: Deploy course site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync locked environment
        run: uv sync --locked --dev
      - name: Validate course and generated site
        run: |
          uv run --locked python scripts/validate_course.py
          uv run --locked python scripts/render_curriculum.py --check
          uv run --locked python scripts/render_outputs.py --check
          uv run --locked python scripts/render_site.py --check
          uv run --locked python -m unittest discover -s tests
          uv run --locked python scripts/run_lesson_tests.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
