<!doctype html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Каталог всех уроков курса Инструменты аналитика.">
  <title>Каталог уроков · Инструменты аналитика</title>
  <link rel="stylesheet" href="style.css?v=20260612b">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true"></span> analyst_tools</a>
      <nav class="site-nav" id="siteNav" aria-label="Основная навигация">
        <a data-nav href="index.html">Курс</a><a data-nav href="catalog.html">Каталог</a><a data-nav href="routes.html">Маршруты</a><a data-nav href="glossary.html">Глоссарий</a>
        <a href="https://github.com/stabuev/analyst_tools" target="_blank" rel="noopener">GitHub</a>
      </nav>
      <div class="header-actions"><button class="quiet-button" id="themeToggle" type="button">Тьма</button><button class="menu-toggle" id="menuToggle" type="button" aria-expanded="false" aria-controls="siteNav">Меню</button></div>
    </div>
  </header>
  <main>
    <section class="page-hero"><div class="container"><p class="eyebrow" id="catalogSummary">Программа курса</p><h1>Каталог</h1><p>Поиск по названию, результату и артефакту. Доступные уроки ведут прямо на соответствующие материалы в GitHub.</p></div></section>
    <section class="section"><div class="container">
      <div class="filter-bar">
        <input class="filter-control" id="catalogSearch" type="search" placeholder="Поиск урока, результата или артефакта">
        <select class="filter-control" id="phaseFilter"><option value="">Все фазы</option></select>
        <select class="filter-control" id="statusFilter"><option value="">Все статусы</option><option value="complete">Готов</option><option value="draft">Черновик</option><option value="designed">Спроектирован</option><option value="planned">Запланирован</option></select>
        <select class="filter-control" id="trackFilter"><option value="">Все треки</option></select>
      </div>
      <p class="catalog-count" id="catalogCount"></p>
      <div class="table-wrap"><table class="catalog-table"><thead><tr><th>Фаза</th><th>Урок</th><th>Мин.</th><th>Треки</th><th>Статус</th><th>GitHub</th></tr></thead><tbody id="catalogBody"></tbody></table></div>
    </div></section>
  </main>
  <footer class="site-footer"><div class="container footer-inner"><span>Инструменты аналитика · каталог программы</span><div class="footer-links"><a href="index.html">Курс</a><a href="routes.html">Маршруты</a></div></div></footer>
  <script src="data.js"></script><script src="common.js"></script><script src="catalog.js"></script>
</body>
</html>
